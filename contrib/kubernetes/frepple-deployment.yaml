---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: log-frepple
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
status: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: log-apache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Mi
status: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: frepple
    frepple.network: "true"
  name: frepple
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frepple
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frepple
    spec:
      containers:
        - env:
            - name: POSTGRES_HOST
              value: frepple-postgres
            - name: POSTGRES_PASSWORD
              value: frepple
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: frepple
            - name: POSTGRES_DBNAME
              value: freppledb
            # A pod's /etc/frepple is ephemeral, so without a fixed key the
            # entrypoint would mint a new SECRET_KEY on every restart — logging
            # everyone out and rotating the Odoo SSO token. Supply a stable key.
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: frepple-secret
                  key: DJANGO_SECRET_KEY
          image: ghcr.io/frepple/frepple-community:latest
          name: frepple-webserver
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "2"
              memory: "4294967296"
            requests:
              cpu: 250m
              memory: "4294967296"
          volumeMounts:
            - mountPath: /var/log/apache2
              name: log-apache
            - mountPath: /var/log/frepple
              name: log-frepple
      restartPolicy: Always
      volumes:
        - name: log-apache
          persistentVolumeClaim:
            claimName: log-apache
        - name: log-frepple
          persistentVolumeClaim:
            claimName: log-frepple
status: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frepple
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 80
  selector:
    app: frepple
status:
  loadBalancer: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: frepple-secret
type: Opaque
stringData:
  # Django secret key. Replace this example value before any real deployment —
  # it signs sessions and CSRF tokens (and SECRET_WEBTOKEN_KEY, the Odoo SSO
  # bridge). Generate a unique one, eg:
  #   kubectl create secret generic frepple-secret \
  #     --from-literal=DJANGO_SECRET_KEY="$(openssl rand -base64 48)"
  DJANGO_SECRET_KEY: "change-me-to-a-unique-random-50-or-more-character-string"
